<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク順序変更機能を追加Todoリスト</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        #task-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        #new-task, #due-date, #due-time {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        #new-task {
            flex-grow: 1;
        }
        #add-task {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #add-task:hover {
            background-color: #45a049;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: #fff;
            margin-bottom: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
            cursor: grab; /* ドラッグ&ドロップ用のカーソル */
        }
        li.dragging {
            opacity: 0.5; /* ドラッグ中のスタイル */
        }
        .completed {
            text-decoration: line-through;
            color: #888;
        }
        .delete-btn, .edit-btn {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 5px;
        }
        .edit-btn {
            background-color: #2196F3;
        }
        .delete-btn:hover {
            background-color: #d32f2f;
        }
        .edit-btn:hover {
            background-color: #1976D2;
        }
        .task-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .task-date {
            font-size: 0.8em;
            color: #666;
        }
        .edit-mode .task-text,
        .edit-mode .task-date {
            display: none;
        }
        .edit-mode .edit-form {
            display: flex;
            flex-direction: column;
        }
        .edit-form {
            display: none;
        }
        .edit-form input {
            margin-bottom: 5px;
        }
        .edit-buttons {
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <h1>編集機能と永続化機能付きTodoリスト</h1>
    <p>タスク、期日、時間を入力して「追加」ボタンをクリックしてください。タスクをクリックすると完了としてマークされます。</p>
    <div id="task-container">
        <input type="text" id="new-task" placeholder="新しいタスクを入力...">
        <input type="date" id="due-date">
        <input type="time" id="due-time">
        <button id="add-task">追加</button>
    </div>
    <ul id="task-list"></ul>

    <script>
    // DateFormatter クラス
    // このクラスは日付と時間のフォーマットを担当します。
    class DateFormatter {
        formatDueDate(date, time) {
            if (!date) return '';
            const formattedDate = new Date(date + 'T' + (time || '00:00')).toLocaleString('ja-JP', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: 'numeric',
                minute: 'numeric',
                hour12: false
            });
            return `期限: ${formattedDate}`;
        }
    }

    // StorageManager クラス
    // このクラスはローカルストレージとのデータのやり取りを管理します。
    class StorageManager {
        constructor() {
            this.storageKey = 'todoListTasks';
        }

        saveTasks(tasks) {
            localStorage.setItem(this.storageKey, JSON.stringify(tasks));
        }

        loadTasks() {
            const tasksJson = localStorage.getItem(this.storageKey);
            return tasksJson ? JSON.parse(tasksJson) : [];
        }
    }

    // TodoList クラス
    // このクラスはタスクの管理と操作を担当します。
    class TodoList {
        constructor(dateFormatter, storageManager) {
            this.tasks = [];
            this.dateFormatter = dateFormatter;
            this.storageManager = storageManager;
            this.loadTasks();
        }

        loadTasks() {
            this.tasks = this.storageManager.loadTasks();
        }

        saveTasks() {
            this.storageManager.saveTasks(this.tasks);
        }

        addTask(taskText, dueDate, dueTime) {
            if (taskText.trim() === '') return null;

            const task = {
                id: Date.now(),
                text: taskText,
                completed: false,
                dueDate: this.dateFormatter.formatDueDate(dueDate, dueTime)
            };

            this.tasks.push(task);
            this.saveTasks();
            return task;
        }

        toggleTaskComplete(taskId) {
            const task = this.tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                this.saveTasks();
                return task;
            }
            return null;
        }

        deleteTask(taskId) {
            const index = this.tasks.findIndex(t => t.id === taskId);
            if (index !== -1) {
                const deletedTask = this.tasks.splice(index, 1)[0];
                this.saveTasks();
                return deletedTask;
            }
            return null;
        }

        editTask(taskId, newText, newDate, newTime) {
            const task = this.tasks.find(t => t.id === taskId);
            if (task) {
                task.text = newText;
                task.dueDate = this.dateFormatter.formatDueDate(newDate, newTime);
                this.saveTasks();
                return task;
            }
            return null;
        }

        reorderTasks(startIndex, endIndex) {
            const [movedTask] = this.tasks.splice(startIndex, 1);
            this.tasks.splice(endIndex, 0, movedTask);
            this.saveTasks();
        }
    }

    // DOMInteractions クラス
    // このクラスはDOMとの相互作用を管理します。
    class DOMInteractions {
        constructor(todoList) {
            this.todoList = todoList;
            this.newTaskInput = document.getElementById('new-task');
            this.addTaskButton = document.getElementById('add-task');
            this.taskList = document.getElementById('task-list');
            this.dueDateInput = document.getElementById('due-date');
            this.dueTimeInput = document.getElementById('due-time');
        }

        initializeEventListeners() {
            this.addTaskButton.addEventListener('click', () => this.handleAddTask());
            this.newTaskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') this.handleAddTask();
            });
            this.taskList.addEventListener('click', (e) => this.handleTaskListClick(e));

            // ドラッグ&ドロップイベントリスナーの追加
            this.taskList.addEventListener('dragstart', (e) => this.handleDragStart(e));
            this.taskList.addEventListener('dragover', (e) => this.handleDragOver(e));
            this.taskList.addEventListener('drop', (e) => this.handleDrop(e));

            // 保存されたタスクを読み込んで表示
            this.renderSavedTasks();
        }

        handleAddTask() {
            const task = this.todoList.addTask(
                this.newTaskInput.value,
                this.dueDateInput.value,
                this.dueTimeInput.value
            );
            if (task) {
                this.renderTask(task);
                this.clearInputs();
            }
        }

        handleTaskListClick(e) {
            const li = e.target.closest('li');
            if (!li) return;

            const taskId = parseInt(li.dataset.taskId);

            if (e.target.classList.contains('delete-btn')) {
                this.todoList.deleteTask(taskId);
                li.remove();
            } else if (e.target.classList.contains('edit-btn')) {
                this.handleEditButtonClick(e);
            } else {
                const updatedTask = this.todoList.toggleTaskComplete(taskId);
                if (updatedTask) {
                    li.classList.toggle('completed', updatedTask.completed);
                }
            }
        }

        renderTask(task) {
            const li = document.createElement('li');
            li.dataset.taskId = task.id;
            li.draggable = true; // ドラッグ可能に設定
            li.className = task.completed ? 'completed' : '';
            li.innerHTML = `
                <div class="task-info">
                    <span class="task-text">${task.text}</span>
                    <span class="task-date">${task.dueDate}</span>
                    <div class="edit-form">
                        <input type="text" value="${task.text}" class="edit-task-input">
                        <input type="date" value="${this.todoList.tasks.find(t => t.id === task.id).dueDate}">
                        <input type="time" value="${this.todoList.tasks.find(t => t.id === task.id).dueTime}">
                        <div class="edit-buttons">
                            <button class="save-edit-btn">保存</button>
                            <button class="cancel-edit-btn">キャンセル</button>
                        </div>
                    </div>
                </div>
                <button class="edit-btn">編集</button>
                <button class="delete-btn">削除</button>
            `;
            this.taskList.appendChild(li);
        }

        renderSavedTasks() {
            this.todoList.tasks.forEach(task => this.renderTask(task));
        }

        clearInputs() {
            this.newTaskInput.value = '';
            this.dueDateInput.value = '';
            this.dueTimeInput.value = '';
        }

        handleEditButtonClick(e) {
            const li = e.target.closest('li');
            if (li.classList.contains('edit-mode')) {
                this.exitEditMode(li);
            } else {
                this.enterEditMode(li);
            }
        }

        enterEditMode(li) {
            li.classList.add('edit-mode');
        }

        exitEditMode(li) {
            li.classList.remove('edit-mode');
        }

        // ドラッグ開始時の処理
        handleDragStart(e) {
            e.target.classList.add('dragging');
            e.dataTransfer.setData('text/plain', e.target.dataset.taskId);
        }

        // ドラッグオーバー時の処理
        handleDragOver(e) {
            e.preventDefault();
            const draggingElement = document.querySelector('.dragging');
            const dropTarget = e.target.closest('li');
            if (dropTarget && draggingElement !== dropTarget) {
                const bounding = dropTarget.getBoundingClientRect();
                const offset = bounding.y + bounding.height / 2;
                if (e.clientY - offset > 0) {
                    dropTarget.after(draggingElement);
                } else {
                    dropTarget.before(draggingElement);
                }
            }
        }

        // ドロップ時の処理
        handleDrop(e) {
            e.preventDefault();
            const draggingElement = document.querySelector('.dragging');
            draggingElement.classList.remove('dragging');
            const dropTarget = e.target.closest('li');
            if (!dropTarget) return;

            const taskId = parseInt(draggingElement.dataset.taskId);
            const targetId = parseInt(dropTarget.dataset.taskId);
            const startIndex = this.todoList.tasks.findIndex(t => t.id === taskId);
            const endIndex = this.todoList.tasks.findIndex(t => t.id === targetId);
            this.todoList.reorderTasks(startIndex, endIndex);
        }
    }

    const dateFormatter = new DateFormatter();
    const storageManager = new StorageManager();
    const todoList = new TodoList(dateFormatter, storageManager);
    const domInteractions = new DOMInteractions(todoList);

    domInteractions.initializeEventListeners();
    </script>
</body>
</html>
