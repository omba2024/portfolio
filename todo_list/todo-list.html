<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修正された日付と時間機能付きTodoリスト</title>
    <style>
        /* 以前のCSSスタイルをここに記述 */
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        #task-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        #new-task, #due-date, #due-time {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        #new-task {
            flex-grow: 1;
        }
        #add-task {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #add-task:hover {
            background-color: #45a049;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: #fff;
            margin-bottom: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
        }
        .completed {
            text-decoration: line-through;
            color: #888;
        }
        .delete-btn {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background-color: #d32f2f;
        }
        .task-info {
            display: flex;
            flex-direction: column;
        }
        .task-date {
            font-size: 0.8em;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>修正された日付と時間機能付きTodoリスト</h1>
    <p>タスク、期日、時間を入力して「追加」ボタンをクリックしてください。タスクをクリックすると完了としてマークされます。</p>
    <div id="task-container">
        <input type="text" id="new-task" placeholder="新しいタスクを入力...">
        <input type="date" id="due-date">
        <input type="time" id="due-time">
        <button id="add-task">追加</button>
    </div>
    <ul id="task-list"></ul>

    <script>
    // DateFormatter クラス
    class DateFormatter {
        formatDueDate(date, time) {
            if (!date) return '';
            const formattedDate = new Date(date + 'T' + (time || '00:00')).toLocaleString('ja-JP', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: 'numeric',
                minute: 'numeric',
                hour12: false
            });
            return `期限: ${formattedDate}`;
        }
    }

    // TodoList クラス
    class TodoList {
        constructor(dateFormatter) {
            this.tasks = [];
            this.dateFormatter = dateFormatter;
        }

        addTask(taskText, dueDate, dueTime) {
            if (taskText.trim() === '') return null;
            
            const task = {
                id: Date.now(),
                text: taskText,
                completed: false,
                dueDate: this.dateFormatter.formatDueDate(dueDate, dueTime)
            };
            
            this.tasks.push(task);
            return task;
        }

        toggleTaskComplete(taskId) {
            const task = this.tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                return task;
            }
            return null;
        }

        deleteTask(taskId) {
            const index = this.tasks.findIndex(t => t.id === taskId);
            if (index !== -1) {
                return this.tasks.splice(index, 1)[0];
            }
            return null;
        }
    }

    // DOMInteractions クラス
    class DOMInteractions {
        constructor(todoList) {
            this.todoList = todoList;
            this.newTaskInput = document.getElementById('new-task');
            this.addTaskButton = document.getElementById('add-task');
            this.taskList = document.getElementById('task-list');
            this.dueDateInput = document.getElementById('due-date');
            this.dueTimeInput = document.getElementById('due-time');
        }

        initializeEventListeners() {
            this.addTaskButton.addEventListener('click', () => this.handleAddTask());
            this.newTaskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') this.handleAddTask();
            });
            this.taskList.addEventListener('click', (e) => this.handleTaskListClick(e));
        }

        handleAddTask() {
            const task = this.todoList.addTask(
                this.newTaskInput.value,
                this.dueDateInput.value,
                this.dueTimeInput.value
            );
            if (task) {
                this.renderTask(task);
                this.clearInputs();
            }
        }

        handleTaskListClick(e) {
            const li = e.target.closest('li');
            if (!li) return;

            const taskId = parseInt(li.dataset.taskId);
            
            if (e.target.classList.contains('delete-btn')) {
                this.todoList.deleteTask(taskId);
                li.remove();
            } else {
                const updatedTask = this.todoList.toggleTaskComplete(taskId);
                if (updatedTask) {
                    li.classList.toggle('completed', updatedTask.completed);
                }
            }
        }

        renderTask(task) {
            const li = document.createElement('li');
            li.dataset.taskId = task.id;
            li.innerHTML = `
                <div class="task-info">
                    <span>${task.text}</span>
                    <span class="task-date">${task.dueDate}</span>
                </div>
                <button class="delete-btn">削除</button>
            `;
            this.taskList.appendChild(li);
        }

        clearInputs() {
            this.newTaskInput.value = '';
            this.dueDateInput.value = '';
            this.dueTimeInput.value = '';
        }
    }

    // アプリケーションの初期化
    const dateFormatter = new DateFormatter();
    const todoList = new TodoList(dateFormatter);
    const domInteractions = new DOMInteractions(todoList);
    domInteractions.initializeEventListeners();
    </script>
</body>
</html>
